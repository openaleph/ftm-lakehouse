# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # python-version: ["3.11", "3.12", "3.13"]
        python-version: ["3.13"]

    # The docker-compose stack the test target boots provides its own
    # postgres for the lakehouse journal. A second postgres service is
    # exposed here on the host so the PSQL variant of test_storage_journal
    # (driven by ``PYTEST_POSTGRESQL_URI``) has a database to talk to –
    # it lives on a different network from the compose stack, so the two
    # don't collide.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lakehouse
          POSTGRES_PASSWORD: lakehouse
          POSTGRES_DB: lakehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lakehouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install poetry
      run: curl -sSL https://install.python-poetry.org | python3 -
    - name: Configure poetry
      run: poetry config virtualenvs.in-project true
    - name: set PY
      run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV
    - name: Set up poetry cache
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ env.PY }}-${{ hashFiles('**/poetry.lock') }}
    - name: Ensure cache is healthy
      if: steps.cache.outputs.cache-hit == 'true'
      run: poetry run pip --version >/dev/null 2>&1 || rm -rf .venv
    - name: Set up pre-commit cache
      uses: actions/cache@v6
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ env.PY }}-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Install dependencies
      run: poetry install --with dev --all-extras && poetry run pip install psycopg2-binary
    - name: Run pre-commit hooks
      run: poetry run pre-commit run
    - name: Lint with flake8
      run: make lint
    - name: Test with pytest (includes docker compose stack via make test)
      # ``make test`` runs ``make start`` (``docker compose up --build -d
      # --wait``) and then ``LAKEHOUSE_TEST_MODE=docker pytest``, so the
      # ``[docker]`` variants of the parametrized fixtures hit the real
      # nginx + lakehouse UDS + putfs UDS stack alongside the local /
      # api variants.
      run: make test
      env:
        PYTEST_POSTGRESQL_URI: postgresql://lakehouse:lakehouse@localhost:5432/lakehouse
    - name: Test building
      run: poetry build
    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        flag-name: run-${{ matrix.python-version }}
        parallel: true

  finish:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@v2
      with:
        parallel-finished: true
        # carryforward: "run-3.11,run-3.12,run-3.13"
        carryforward: "run-3.13"
